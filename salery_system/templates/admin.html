<!DOCTYPE html>
<html>
<head>
    <title>Admin Panel</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        body {
            align-items: flex-start;
            padding-top: 20px;
        }
        .admin-container {
            width: 90%;
            max-width: 900px;
        }
        .card {
            width: 100%;
            margin-bottom: 20px;
        }
        .form-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
        .form-group input {
            width: 100%;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        th {
            background: #667eea;
            color: white;
            padding: 12px;
            text-align: left;
        }
        td {
            padding: 10px;
            border-bottom: 1px solid #ddd;
        }
        tr:hover {
            background: #f5f5f5;
        }
        .back-btn {
            background: #999 !important;
            width: 100%;
            margin-top: 15px;
        }
        .back-btn:hover {
            background: #777 !important;
        }
    </style>
</head>
<body>
    <div class="admin-container">
        <div class="card">
            <h2>Admin Panel - Add Employee</h2>
            <form method="POST">
                <div class="form-group">
                    <input name="id" placeholder="Employee ID" required>
                    <input name="password" type="password" placeholder="Password" required>
                    <input name="name" placeholder="Full Name" required>
                    <input name="role" placeholder="Job Role" required>
                    <input name="basic" type="number" step="0.01" placeholder="Basic Salary" required>
                    <input name="hra" type="number" step="0.01" placeholder="HRA" required>
                    <input name="da" type="number" step="0.01" placeholder="DA" required>
                    <input name="tax" type="number" step="0.01" placeholder="Tax" required>
                    <input name="days" type="number" placeholder="Working Days" required>
                    <input name="leaves" type="number" placeholder="Leaves" required>
                    <input name="pf_amount" type="number" step="0.01" placeholder="PF Amount" required>
                    <input name="pf_no" placeholder="PF Number" required>
                </div>
                <button type="submit" style="margin-top: 20px; width: 100%;">Add Employee</button>
            </form>
            <a href="/"><button class="back-btn">Home</button></a>
        </div>

        <div class="card">
            <h3>Employee List</h3>
            {% if employees %}
                <table>
                    <tr>
                        <th>ID</th>
                        <th>Name</th>
                        <th>Role</th>
                    </tr>
                    {% for emp in employees %}
                    <tr>
                        <td>{{ emp[0] }}</td>
                        <td>{{ emp[1] }}</td>
                        <td>{{ emp[2] }}</td>
                    </tr>
                    {% endfor %}
                </table>
            {% else %}
                <p style="text-align: center; color: #999;">No employees added yet.</p>
            {% endif %}
        </div>
    </div>
</body>
</html>
